<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>

<body>
    <div id="root">
        <form id="create-todo-form" action="">
            <input name="title" type="text" placeholder="title">
            <input name="note" type="text" placeholder="note">
            <input name="due-date" type="date">
            <select name="priority">
                <option value="1">High</option>
                <option value="2">Regular</option>
                <option value="3">Low</option>
            </select>
            <select name="projects"></select>
            <button>Create</button>
        </form>

        <form action="" id="create-project-form">
            <input type="text" name="project-name" placeholder="project name">
            <button>Create</button>
        </form>

        <ul id="todo-list"></ul>
        <ul id="project-list"></ul>
    </div>
</body>

</html>
