<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>

<body>
    <header class="flex-col-end">
        <div class="logo">
            <h1>Todo App</h1>
        </div>
        <ul class="flex-col-end">
            <li><a href="#">Today</a></li>
            <li><a href="#">Upcoming</a></li>
            <li><a href="#">Skipped</a></li>
        </ul>
        <ul class="flex-col-end">
            <li><a href="#">Urgent</a></li>
            <li><a href="#">Should Do</a></li>
            <li><a href="#">Optional</a></li>
        </ul>
    </header>
    <main>
        <div class="project-section">
            <div class="main-header">
                <h2>Projects</h2>
                <button id="open-project-form-modal-button">Create Project</button>
            </div>
            <ul id="project-list"></ul>
        </div>
        <dialog id="form-modal">
            <form action="">
                <div>
                    <label for="project-name-input">Project Name: </label>
                    <input id="project-name-input" type="text">
                </div>
                <button id="close-modal-button">Close</button>
                <button>Create</button>
            </form>
        </dialog>
    </main>
</body>

</html>
